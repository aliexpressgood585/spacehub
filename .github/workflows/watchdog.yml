name: Bot Watchdog

# Heartbeat monitor: the bot updates bot_state.updated_at every minute.
# If it goes stale >15 minutes the bot is down (cron dead / function crashing)
# → open a GitHub issue so the owner gets a push/email notification.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  PROJECT_REF: mdvheizhciuvqychtwxr

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check heartbeat
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # v55: Telegram push helper — no-op if secrets absent (GitHub-issue fallback stays)
          tg() {
            [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ] && return 0
            curl -s -m 15 -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" --data-urlencode "text=$1" > /dev/null || true
          }
          row=$(curl -s -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT updated_at, balance, shields FROM bot_state WHERE id=1;"}')
          echo "state: $row"
          upd=$(echo "$row" | grep -o '"updated_at":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$upd" ]; then verdict="NO_STATE"; else
            age=$(( $(date -u +%s) - $(date -u -d "$upd" +%s) ))
            echo "heartbeat age: ${age}s"
            if [ "$age" -gt 900 ]; then verdict="STALE"; else verdict="OK"; fi
          fi
          echo "verdict=$verdict"
          existing=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open&labels=watchdog" \
            | grep -o '"number": *[0-9]*' | head -1 | grep -o '[0-9]*' || true)
          if [ "$verdict" != "OK" ]; then
            body="הבוט לא מעדכן את מצבו כבר יותר מ-15 דקות (updated_at=${upd:-none}). ייתכן שה-cron נפל או שהפונקציה קורסת. בדיקה: push לקובץ .status-ping או צפייה בלוגים של Supabase."
            if [ -z "$existing" ]; then
              curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/issues" \
                -d "{\"title\":\"🚨 Bot heartbeat stale — הבוט לא מגיב\",\"body\":$(echo "$body" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),\"labels\":[\"watchdog\"]}" > /dev/null
              tg "🚨 SpaceHub: הבוט לא מגיב מעל 15 דקות (updated_at=${upd:-none}). בדוק את Supabase."
              echo "issue opened"
            else
              echo "issue #$existing already open — not duplicating"
            fi
          else
            if [ -n "$existing" ]; then
              curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$existing/comments" \
                -d '{"body":"✅ הבוט חזר לפעום — נסגר אוטומטית."}' > /dev/null
              curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$existing" \
                -d '{"state":"closed"}' > /dev/null
              echo "recovery: issue #$existing closed"
            fi
            echo "heartbeat OK"
          fi

          # v52.1: shield-trigger alerts — any active shield opens its own issue
          active=$(echo "$row" | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin); sh=(d[0].get('shields') or {}) if d else {}
              names={'donch_paused':'פריצות מושהות (kill-switch)','rota_paused':'רוטציה מושהית (kill-switch)','day_loss_paused':'בלם יום שחור -5% דרוך','depeg_paused':'🚨 חשד לדה-פג USDT'}
              print(', '.join(v for k,v in names.items() if sh.get(k)))
          except Exception: print('')")
          shissue=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open&labels=shield" \
            | grep -o '"number": *[0-9]*' | head -1 | grep -o '[0-9]*' || true)
          if [ -n "$active" ]; then
            if [ -z "$shissue" ]; then
              curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/issues" \
                -d "{\"title\":\"🛡️ מגן הופעל: ${active}\",\"body\":\"מגן סיכון פעיל כרגע: ${active}. כניסות חדשות מושהות עד החלמה. הפוזיציות הפתוחות ממשיכות להיות מנוהלות כרגיל.\",\"labels\":[\"shield\"]}" > /dev/null
              tg "🛡️ SpaceHub: מגן הופעל — ${active}. כניסות חדשות מושהות; פוזיציות פתוחות ממשיכות כרגיל."
              echo "shield issue opened: $active"
            else echo "shield issue already open"; fi
          else
            if [ -n "$shissue" ]; then
              curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$shissue/comments" \
                -d '{"body":"✅ כל המגנים שוחררו — המסחר חזר למצב רגיל."}' > /dev/null
              curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$shissue" \
                -d '{"state":"closed"}' > /dev/null
              echo "shield issue closed"
            fi
            echo "shields clear"
          fi

      - name: Error-spike check (v54)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          errs=$(curl -s -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT count(*) AS n FROM bot_errors WHERE ts > now() - interval '"'"'60 minutes'"'"';"}' \
            | grep -o '"n": *[0-9]*' | grep -o '[0-9]*' | head -1 || true)
          echo "errors last 60m: ${errs:-0}"
          if [ "${errs:-0}" -gt 30 ]; then
            existing=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/issues?state=open&labels=error-spike" \
              | grep -o '"number": *[0-9]*' | head -1 | grep -o '[0-9]*' || true)
            if [ -z "$existing" ]; then
              body="הבוט רשם ${errs} שגיאות בשעה האחרונה (סף התראה: 30). בדיקה: SELECT scope, count(*) FROM bot_errors WHERE ts > now() - interval '1 hour' GROUP BY scope ORDER BY 2 DESC;"
              curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/issues" \
                -d "{\"title\":\"⚠️ Error spike — ${errs} שגיאות בבוט בשעה האחרונה\",\"body\":$(echo "$body" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),\"labels\":[\"error-spike\"]}" > /dev/null
              echo "error-spike issue opened"
            else
              echo "error-spike issue #$existing already open"
            fi
          fi

      - name: 50-trade checkpoint (v54)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          tg() { [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ] && return 0
            curl -s -m 15 -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" -d "chat_id=${TG_CHAT}" --data-urlencode "text=$1" > /dev/null || true; }
          row=$(curl -s -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT count(*) AS n, round(100.0*count(*) FILTER (WHERE pnl>0)/greatest(count(*),1),1) AS wr, round(avg(pnl/nullif(risk_usd,0))::numeric,4) AS avg_r FROM bot_trades WHERE strategy='"'"'DONCH4H'"'"' AND status != '"'"'OPEN'"'"' AND risk_usd > 0 AND closed_at >= (SELECT COALESCE(min(ts),'"'"'2026-01-01'"'"'::timestamptz) FROM bot_equity);"}')
          echo "checkpoint: $row"
          n=$(echo "$row" | grep -o '"n": *[0-9]*' | grep -o '[0-9]*' | head -1 || true)
          if [ "${n:-0}" -ge 50 ]; then
            existing=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/issues?state=all&labels=checkpoint-50" \
              | grep -o '"number": *[0-9]*' | head -1 | grep -o '[0-9]*' || true)
            if [ -z "$existing" ]; then
              wr=$(echo "$row" | grep -o '"wr": *[0-9.]*' | grep -o '[0-9.]*' | head -1 || true)
              avgr=$(echo "$row" | grep -o '"avg_r": *[-0-9.]*' | grep -oE '\-?[0-9.]+' | head -1 || true)
              body="צ'קפוינט 50 העסקאות הושלם: n=${n}, WR=${wr}%, avg R=${avgr}. רף הציפייה: WR~66%, +0.046R לעסקה. אם בתוך הרף — אפשר לשקול העלאת סיכון 1.25%→1.75% לפי טבלת מונטה-קרלו (v50bt, status/bt-latest). אם מתחת לרף — לחקור לפני שמעלים."
              curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/issues" \
                -d "{\"title\":\"🎯 צ'קפוינט 50 עסקאות DONCH4H — n=${n} WR=${wr}% avgR=${avgr}\",\"body\":$(echo "$body" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),\"labels\":[\"checkpoint-50\"]}" > /dev/null
              tg "🎯 SpaceHub: הגעת ל-50 עסקאות DONCH4H! n=${n} WR=${wr}% avgR=${avgr}. זמן להשוות לרצועות ולהחליט על העלאת סיכון."
              echo "checkpoint issue opened"
            else
              echo "checkpoint issue already exists (#$existing) — fires once"
            fi
          else
            echo "checkpoint progress: ${n:-0}/50"
          fi
