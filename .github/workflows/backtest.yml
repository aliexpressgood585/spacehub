name: Strategy Backtest

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to backtest'
        required: false
        default: '45'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Download historical data (data.binance.vision)
        env:
          BT_DAYS: ${{ github.event.inputs.days }}
        run: bash backtest/fetch.sh

      - name: Run backtest
        run: deno run --allow-read --allow-env backtest/backtest.ts
