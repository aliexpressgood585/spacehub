name: Strategy Backtest

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to backtest'
        required: false
        default: '45'
      mode:
        description: 'portfolio / signals / meanrev / explore / refine / validate'
        required: false
        default: 'portfolio'
      months:
        description: 'Months of history (explore/refine/validate modes)'
        required: false
        default: '6'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Download historical data (data.binance.vision)
        env:
          BT_DAYS: ${{ github.event.inputs.days }}
          BT_MONTHS: ${{ github.event.inputs.months }}
        run: |
          case "${{ github.event.inputs.mode }}" in
            explore|refine|validate|range) bash backtest/fetch-explore.sh ;;
            *) bash backtest/fetch.sh ;;
          esac

      - name: Run backtest
        env:
          BT_MODE: ${{ github.event.inputs.mode }}
        run: deno run --allow-read --allow-env backtest/backtest.ts
