name: Strategy Backtest

on:
  schedule:
    - cron: '0 6 1 * *'   # monthly edge-decay regression (1st of month, 06:00 UTC)
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to backtest'
        required: false
        default: '45'
      mode:
        description: 'portfolio / signals / meanrev / explore / refine / validate'
        required: false
        default: 'portfolio'
      months:
        description: 'Months of history (explore/refine/validate modes)'
        required: false
        default: '6'

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      MODE: ${{ github.event.inputs.mode || 'freq' }}
      MONTHS: ${{ github.event.inputs.months || '36' }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Download historical data (data.binance.vision)
        env:
          BT_DAYS: ${{ github.event.inputs.days || '45' }}
          BT_MONTHS: ${{ env.MONTHS }}
        run: |
          { [ "$MODE" = "v47bt" ] || [ "$MODE" = "v49bt" ]; } && export BT_FETCH_LIQ=1
          case "$MODE" in
            explore|refine|validate|range|freq|rota|v43bt|v44bt|v45bt|v46bt|v47bt|v48bt|v49bt|v50bt|v51bt|v52bt|v53bt|v54bt|v55bt|v56bt|v57bt|v58bt|v59bt|v60bt|v61bt|v62bt|v63bt|v64bt|v65bt|v66bt|v67bt|v68bt|v69bt) bash backtest/fetch-explore.sh ;;
            *) bash backtest/fetch.sh ;;
          esac

      - name: Run backtest
        env:
          BT_MODE: ${{ env.MODE }}
        run: deno run --allow-read --allow-env backtest/backtest.ts | tee /tmp/bt.log

      - name: Commit result snapshot (dispatch runs)
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p status
          { echo "backtest $(date -u +%Y-%m-%dT%H:%MZ) mode=$MODE months=$MONTHS"; tail -250 /tmp/bt.log; } > status/bt-latest.txt
          git config user.name "backtest-bot"; git config user.email "actions@github.com"
          git add status/bt-latest.txt
          git commit -m "status: backtest result [skip ci]" || echo "no changes"
          git pull --rebase origin main || true
          git push || echo "push failed (non-fatal)"

      - name: Commit regression report (scheduled runs)
        if: github.event_name == 'schedule'
        run: |
          mkdir -p status
          { echo "monthly regression $(date -u +%Y-%m-%d) mode=$MODE months=$MONTHS"; tail -60 /tmp/bt.log; } > status/regression.txt
          git config user.name "regression-bot"; git config user.email "actions@github.com"
          git add status/regression.txt
          git commit -m "status: monthly edge regression [skip ci]" || echo "no changes"
          git pull --rebase origin main || true
          git push || echo "push failed (non-fatal)" 
