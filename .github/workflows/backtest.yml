name: Strategy Backtest

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to backtest'
        required: false
        default: '45'
      mode:
        description: 'portfolio (P&L sim) or signals (per-signal validation)'
        required: false
        default: 'portfolio'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Download historical data (data.binance.vision)
        env:
          BT_DAYS: ${{ github.event.inputs.days }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "explore" ]; then
            bash backtest/fetch-explore.sh
          else
            bash backtest/fetch.sh
          fi

      - name: Run backtest
        env:
          BT_MODE: ${{ github.event.inputs.mode }}
        run: deno run --allow-read --allow-env backtest/backtest.ts
