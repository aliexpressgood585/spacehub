name: Close All Open Positions

on:
  workflow_dispatch:

env:
  PROJECT_REF: mdvheizhciuvqychtwxr

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Close all OPEN trades at entry price
        run: |
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/${{ env.PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "UPDATE bot_trades SET status='\''MANUAL'\'', exit_price=entry_price, pnl=0-(fee), pnl_pct=0, closed_at=NOW() WHERE status='\''OPEN'\'' RETURNING id, sym, side, entry_price;"}' \
            | tee /tmp/close_result.json
          echo "Done"
