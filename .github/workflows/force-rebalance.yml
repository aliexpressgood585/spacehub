name: Force Rotation Rebalance

on:
  workflow_dispatch:

env:
  PROJECT_REF: mdvheizhciuvqychtwxr

jobs:
  force:
    runs-on: ubuntu-latest
    steps:
      - name: Clear rebalanced_at (next bot scan re-runs rotation)
        run: |
          curl -s -X POST "https://api.supabase.com/v1/projects/${{ env.PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "UPDATE bot_state SET rebalanced_at = NULL WHERE id = 1 RETURNING rebalanced_at;"}'
          echo ""
          echo "Cleared — rotation will rebalance on the next 1-minute scan."
