name: Deploy Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      supabase_token:
        description: 'Supabase Access Token'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy trading-bot function
        run: supabase functions deploy trading-bot --project-ref mdvheizhciuvqychtwxr
        env:
          SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token || secrets.SUPABASE_ACCESS_TOKEN }}
