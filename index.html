    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SpaceHub",
      "url": "https://spacehub-nu.vercel.app",
      "description": "Real-time space data platform — ISS tracking, satellite tracker, space weather, moon phases, launch countdowns",
      "applicationCategory": "Science",
      "operatingSystem": "Web, iOS, Android",
      "inLanguage": ["en", "he"],
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "featureList": [
        "Real-time ISS tracking",
        "ISS pass-over alerts by city",
        "Live satellite tracker",
        "Space weather monitoring",
        "Moon phase calculator",
        "Rocket launch countdown",
        "3D Solar System viewer",
        "Interactive star map",
        "Space quiz",
        "NASA APOD daily image"
      ]
    }
    </script>

    <!-- FAQ Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Where is the International Space Station right now?",
          "acceptedAnswer": { "@type": "Answer", "text": "You can track the ISS live on SpaceHub. The ISS orbits Earth at ~408 km altitude at 27,600 km/h, completing one orbit every 90 minutes." }
        },
        {
          "@type": "Question",
          "name": "When will the ISS pass over my city?",
          "acceptedAnswer": { "@type": "Answer", "text": "SpaceHub's ISS Pass Predictor shows the next 5 ISS passes for dozens of cities worldwide. Enter your city to get exact times and visibility duration." }
        },
        {
          "@type": "Question",
          "name": "How many astronauts are in space right now?",
          "acceptedAnswer": { "@type": "Answer", "text": "SpaceHub shows the live count of astronauts currently in space, including ISS crew members and any other missions in orbit." }
        },
        {
          "@type": "Question",
          "name": "What is space weather and why does it matter?",
          "acceptedAnswer": { "@type": "Answer", "text": "Space weather refers to solar wind, geomagnetic storms, and radiation events caused by the Sun. SpaceHub tracks real-time solar wind speed, Kp index, and aurora forecasts." }
        },
        {
          "@type": "Question",
          "name": "What is NASA APOD?",
          "acceptedAnswer": { "@type": "Answer", "text": "NASA's Astronomy Picture of the Day (APOD) is a daily image or video of the universe, explained by a professional astronomer. SpaceHub shows the latest APOD every day." }
        }
      ]
    }
    </script>
