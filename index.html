        navigator.serviceWorker.addEventListener('message', function(e) {
          if (e.data && e.data.type === 'SW_UPDATED') safeReload();
        });
      }

      if (sessionStorage.getItem('_sw_fail')) {
        sessionStorage.removeItem('_sw_fail');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            return Promise.all(regs.map(function(r) { return r.unregister(); }));

            return 'caches' in window ? caches.keys().then(function(ks) {
              return Promise.all(ks.map(function(k) { return caches.delete(k); }));
            }) : Promise.resolve();
          }).then(function() { safeReload(); });
        }
        return;
      }

      // Clear any outdated cache versions
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { if (!KEEP[k]) caches.delete(k); });
        });
