  <script>
    // Auto-recover from stale SW cache (MIME type errors after deploy)
    // This runs inline — SW cannot intercept it
    (function() {
      var KEEP = { 'spacehub-v11': 1, 'spacehub-api-v6': 1 };

      // If last load failed due to stale SW: nuke everything and reload clean
      if (sessionStorage.getItem('_sw_fail')) {
        sessionStorage.removeItem('_sw_fail');
        var nuked = false;
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            return Promise.all(regs.map(function(r) { return r.unregister(); }));
          }).then(function() {
            return 'caches' in window ? caches.keys().then(function(ks) {
              return Promise.all(ks.map(function(k) { return caches.delete(k); }));
            }) : Promise.resolve();
          }).then(function() { if (!nuked) { nuked = true; window.location.reload(); } });
        }
        return;
      }

      // Normal load: clear any outdated cache versions
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { if (!KEEP[k]) caches.delete(k); });
        });
      }

      // Force SW to check for updates
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.update(); });
        });
      }
    })();
  </script>
