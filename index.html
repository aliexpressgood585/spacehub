<!doctype html>
<html lang="en">
  <head>

    <!-- SEO Primary -->
    <title>SpaceHub | Real-Time Space Tracker — ISS, Satellites, Space Weather</title>
    <meta name="description" content="Track the International Space Station ISS in real time. Get alerts when ISS passes over your city. Live satellites, space weather, moon phase, launch countdowns. Free space data platform." />

    <meta name="author" content="SpaceHub" />
    <link rel="canonical" href="https://spacehub-nu.vercel.app" />

    <!-- Geo / International -->
    <meta name="geo.region" content="US" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="1 day" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://spacehub-nu.vercel.app" />
    <meta property="og:title" content="SpaceHub — Real-Time Space Tracker" />

    <meta name="twitter:card" content="summary_large_image" />

      "name": "SpaceHub",
      "url": "https://spacehub-nu.vercel.app",
      "description": "Real-time space data platform — ISS tracking, satellite tracker, space weather, moon phases, launch countdowns",
      "applicationCategory": "Science",
      "operatingSystem": "Web, iOS, Android",
      "inLanguage": ["en", "he"],
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "featureList": [
        "Real-time ISS tracking",
        "ISS pass-over alerts by city",
        "Live satellite tracker",
        "Space weather monitoring",
        "Moon phase calculator",
        "Rocket launch countdown",
        "3D Solar System viewer",
        "Interactive star map",
        "Space quiz",
        "NASA APOD daily image"
